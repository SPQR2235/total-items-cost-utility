<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Total Items Cost Utility</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./source/style/style.css">
</head>
    
<body>
    <header>
        <div id="logo">
            Total Items Cost Utility<div id="under-logo">by SPQR_rsnt</div>
        </div>
        <div id="result-wrap">
            <div id="total-cost">Total Cost: 0.00</div>
            <div id="total-cost-with-commission">With Commission: 0.00</div>
        </div>
    </header>
    <div id="commission-wrap">
        <input type="number" id="commission-input" class="commission-input" placeholder="Commission: 0.00%">
    </div>
    <div id="item-wrap"></div>
    <footer>
        <div id="footer-wrap">
            <div id="button-wrap">
                <button id="add-item-button">Add New Item</button>
                <button id="delete-item-button">Delete Last Item</button>
                <button id="reset-button">Reset All</button>
            </div>
            <div id="data-button-wrap">
                <button id="load-button" class="data-button">Load</button>
                <button id="load-file-button" class="data-button">Load File</button>
                <button id="save-button" class="data-button">Save</button>
                <button id="download-button" class="data-button">Download</button>
            </div>
        </div>
    </footer>
    <script type="module" src="./source/Logic/ViewModel.js"></script>
</body>

</html>
